<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">

<title>Pet Cost by Breed — embeddable table</title>
<meta property="og:title" content="Pet Cost by Breed Widget">
<meta property="og:description" content="Annual dog & cat costs breakdown table.">
<meta property="og:image" content="https://petexpenses.com/assets/images/og-dog.jpg">
<meta name="twitter:card" content="summary_large_image">
<link rel="canonical" href="https://petexpenses.com/widget.html">
<meta name="description" content="Embeddable annual pet cost by breed table for dogs and cats. Free tool for pet websites.">
<style>
:root{--ink:#1B1340;--ink-soft:#4A3F6F;--ink-mute:#6B6490;--coral:#FF5A3C;--cream:#FFF7E8;--cream-2:#FBEFD6;--paper:#FFF;--radius:10px}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:system-ui,-apple-system,sans-serif;color:var(--ink);background:transparent;font-size:14px;line-height:1.5}
.pet-table-wrap{max-width:680px;margin:0 auto;padding:16px}
h1{font-size:1.1rem;font-weight:700;margin-bottom:12px;display:flex;align-items:center;gap:6px}
.tab-bar{display:flex;gap:4px;margin-bottom:12px}
.tab-btn{padding:6px 16px;border:2px solid var(--ink);border-radius:999px;font-weight:600;font-size:13px;background:var(--paper);cursor:pointer;color:var(--ink);transition:all .15s}
.tab-btn.active{background:var(--ink);color:var(--cream)}
.tab-btn:hover{transform:translateY(-1px)}
table{width:100%;border-collapse:collapse;font-size:13px;background:var(--paper);border-radius:var(--radius);overflow:hidden;box-shadow:0 1px 3px rgba(27,19,64,.1)}
th{background:var(--ink);color:var(--cream);padding:8px 10px;text-align:left;font-size:10px;letter-spacing:.08em;text-transform:uppercase}
td{padding:7px 10px;border-bottom:1px solid rgba(27,19,64,.06)}
tr:nth-child(even) td{background:var(--cream-2)}
tr:hover td{background:var(--coral);color:var(--cream)}
.price{font-weight:700;font-size:13px;white-space:nowrap;color:var(--coral)}
tr:hover td.price{color:var(--cream)}
.footnote{text-align:center;margin-top:10px;font-size:11px;color:var(--ink-mute)}
.footnote a{color:var(--coral);font-weight:600}
.embed-bar{text-align:center;margin-bottom:10px;font-size:11px}
.embed-bar a{color:var(--ink-mute);text-decoration:none;border-bottom:1px dashed var(--ink-mute)}
.embed-bar a:hover{color:var(--coral);border-color:var(--coral)}
</style>
</head>
<body>
<div class="pet-table-wrap">
<div class="embed-bar"><a href="https://petexpenses.com/embed/" target="_top">📋 Get this widget for your site →</a></div>
<h1>🐾 Annual Pet Cost by Breed (2026, US)</h1>
<div class="tab-bar">
<button class="tab-btn active" onclick="showTab('dog')" id="tab-dog">🐕 Dogs</button>
<button class="tab-btn" onclick="showTab('cat')" id="tab-cat">🐈 Cats</button>
</div>
<div id="dog-table"></div>
<div id="cat-table" style="display:none"></div>
<div class="footnote">Data: APPA, AVMA, NAPHIA, BLS · <a href="https://petexpenses.com" target="_blank" rel="noopener">petexpenses.com</a></div>
</div>
<script>
const DOGS=[
["Chihuahua","$900–$1,820","chihuahua-cost"],["Dachshund","$1,100–$2,280","dachshund-cost"],["Beagle","$1,200–$2,400","beagle-cost"],["Shih Tzu","$1,200–$2,400","shih-tzu-cost"],["Boston Terrier","$1,250–$2,500","boston-terrier-cost"],["Pomeranian","$1,300–$2,600","pomeranian-cost"],["Yorkshire Terrier","$1,300–$2,700","yorkshire-terrier-cost"],["Corgi (Pembroke)","$1,350–$2,800","corgi-pembroke-cost"],["Standard Poodle","$1,500–$3,100","poodle-cost"],["Siberian Husky","$1,500–$3,100","siberian-husky-cost"],["Australian Shepherd","$1,550–$3,200","australian-shepherd-cost"],["Boxer","$1,600–$3,300","boxer-cost"],["Labrador Retriever","$1,600–$3,300","labrador-retriever-cost"],["Rottweiler","$1,600–$3,400","rottweiler-cost"],["Golden Retriever","$1,800–$3,600","golden-retriever-cost"],["German Shepherd","$1,800–$3,700","german-shepherd-cost"],["Bulldog","$2,000–$3,900","bulldog-cost"],["Bernese Mountain Dog","$2,100–$4,200","bernese-mountain-dog-cost"],["Great Dane","$2,200–$4,400","great-dane-cost"],["French Bulldog","$2,200–$4,500","french-bulldog-cost"]
];
const CATS=[
["Domestic Shorthair","$800–$1,600","domestic-shorthair-cost"],["Domestic Longhair","$850–$1,700","domestic-longhair-cost"],["Russian Blue","$850–$1,720","russian-blue-cost"],["American Shorthair","$900–$1,800","american-shorthair-cost"],["British Shorthair","$950–$1,920","british-shorthair-cost"],["Abyssinian","$1,000–$2,000","abyssinian-cost"],["Burmese","$1,050–$2,100","burmese-cost"],["Cornish Rex","$1,050–$2,100","cornish-rex-cost"],["Tonkinese","$1,050–$2,120","tonkinese-cost"],["Exotic Shorthair","$1,100–$2,200","exotic-shorthair-cost"],["Oriental Shorthair","$1,100–$2,200","oriental-shorthair-cost"],["Devon Rex","$1,100–$2,240","devon-rex-cost"],["Manx","$1,120–$2,240","manx-cost"],["Norwegian Forest Cat","$1,150–$2,300","norwegian-forest-cat-cost"],["Siamese","$1,150–$2,320","siamese-cost"],["Birman","$1,200–$2,400","birman-cost"],["Scottish Fold","$1,200–$2,420","scottish-fold-cost"],["Maine Coon","$1,250–$2,500","maine-coon-cost"],["Bengal","$1,250–$2,520","bengal-cost"],["Sphynx","$1,358–$2,842","sphynx-cost"],["Ragdoll","$1,350–$2,700","ragdoll-cost"],["Persian","$1,400–$2,800","persian-cost"],["Savannah","$1,500–$3,000","savannah-cost"]
];
function renderTable(d,c){var h='<table><thead><tr><th>Breed</th><th>Annual Cost (2026)</th><th></th></tr></thead><tbody>';for(var i=0;i<d.length;i++){h+='<tr><td><strong>'+d[i][0]+'</strong></td><td class="price">'+d[i][1]+'</td><td><a href="https://petexpenses.com/breeds/'+d[i][2]+'" target="_blank" rel="noopener" style="color:#FF5A3C;font-weight:600;font-size:12px;text-decoration:none">Details →</a></td></tr>'}h+='</tbody></table>';document.getElementById(c).innerHTML=h}
function showTab(s){document.getElementById('tab-dog').className='tab-btn'+(s==='dog'?' active':'');document.getElementById('tab-cat').className='tab-btn'+(s==='cat'?' active':'');document.getElementById('dog-table').style.display=s==='dog'?'block':'none';document.getElementById('cat-table').style.display=s==='cat'?'block':'none'}
renderTable(DOGS,'dog-table');renderTable(CATS,'cat-table');
</script>
</body>
</html>
